stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  KUBE_NAMESPACE: simkeu
  REGISTRY: $CI_REGISTRY

# ─────────────────────────────────────────────
# Build & Push template (reused by all services)
# ─────────────────────────────────────────────
.build_push: &build_push
  stage: build
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      IMAGE="$CI_REGISTRY_IMAGE/$SERVICE_NAME"
      docker build \
        --cache-from "$IMAGE:latest" \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        -t "$IMAGE:$CI_COMMIT_SHORT_SHA" \
        -t "$IMAGE:latest" \
        "services/$SERVICE_NAME"
      docker push "$IMAGE:$CI_COMMIT_SHORT_SHA"
      docker push "$IMAGE:latest"
  rules:
    - changes:
        - "services/$SERVICE_NAME/**/*"
        - .gitlab-ci.yml

# ─────────────────────────────────────────────
# Deploy template
# (runs on a GitLab Runner installed on your server)
# ─────────────────────────────────────────────
.deploy: &deploy
  stage: deploy
  tags:
    - self-hosted
  script:
    - |
      kubectl set image deployment/$SERVICE_NAME \
        $SERVICE_NAME="$CI_REGISTRY_IMAGE/$SERVICE_NAME:$CI_COMMIT_SHORT_SHA" \
        -n $KUBE_NAMESPACE
      kubectl rollout status deployment/$SERVICE_NAME -n $KUBE_NAMESPACE --timeout=120s
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - "services/$SERVICE_NAME/**/*"
        - .gitlab-ci.yml

# ─────────────────────────────────────────────
# Auth Service
# ─────────────────────────────────────────────
build:auth:
  <<: *build_push
  variables:
    SERVICE_NAME: auth

deploy:auth:
  <<: *deploy
  variables:
    SERVICE_NAME: auth
  needs: [build:auth]

