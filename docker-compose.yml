version: '3.8'

x-common-env: &common-env
  DB_HOST: db
  DB_PORT: 5432
  DB_USER: simkeu
  DB_PASSWORD: ${POSTGRES_PASSWORD}
  JWT_SECRET: ${JWT_SECRET}
  APP_PORT: 8080

services:
  db:
    image: postgres:15
    container_name: simkeu-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - simkeu-network

  auth:
    build: ./services/auth
    container_name: simkeu-auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_NAME: simkeu_auth
      DEBITUR_SERVICE_URL: http://debitur:8080
    networks:
      - simkeu-network

  blockchain:
    build: ./services/blockchain
    container_name: simkeu-blockchain
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_NAME: simkeu_blockchain
    networks:
      - simkeu-network

  debitur:
    build: ./services/debitur
    container_name: simkeu-debitur
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_NAME: simkeu_debitur
    networks:
      - simkeu-network

  log:
    build: ./services/log
    container_name: simkeu-log
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_NAME: simkeu_log
    networks:
      - simkeu-network

  master:
    build: ./services/master
    container_name: simkeu-master
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_NAME: simkeu_master
    networks:
      - simkeu-network

  payment:
    build: ./services/payment
    container_name: simkeu-payment
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_NAME: simkeu_payment
    networks:
      - simkeu-network

  piutang:
    build: ./services/piutang
    container_name: simkeu-piutang
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_NAME: simkeu_piutang
    networks:
      - simkeu-network

  realisasi:
    build: ./services/realisasi
    container_name: simkeu-realisasi
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_NAME: simkeu_realisasi
    networks:
      - simkeu-network

  tagihan:
    build: ./services/tagihan
    container_name: simkeu-tagihan
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *common-env
      DB_NAME: simkeu_tagihan
    networks:
      - simkeu-network

  nginx:
    image: nginx:alpine
    container_name: simkeu-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /opt/simkeu/nginx:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - auth
      - blockchain
      - debitur
      - log
      - master
      - payment
      - piutang
      - realisasi
      - tagihan
    networks:
      - simkeu-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  simkeu-network:
    driver: bridge