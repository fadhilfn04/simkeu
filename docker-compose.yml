version: '3.8'

services:
  # Shared PostgreSQL Database
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simkeu"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - simkeu-network

  # Auth Service
  auth:
    build: ./services/auth
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: simkeu
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: simkeu_auth
      JWT_SECRET: ${JWT_SECRET}
      APP_PORT: 8080
    networks:
      - simkeu-network

  # Blockchain Service
  blockchain:
    build: ./services/blockchain
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: simkeu
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: simkeu_blockchain
      JWT_SECRET: ${JWT_SECRET}
      APP_PORT: 8080
    networks:
      - simkeu-network

  # Debitur Service
  debitur:
    build: ./services/debitur
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: simkeu
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: simkeu_debitur
      JWT_SECRET: ${JWT_SECRET}
      APP_PORT: 8080
    networks:
      - simkeu-network

  # Log Service
  log:
    build: ./services/log
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: simkeu
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: simkeu_log
      JWT_SECRET: ${JWT_SECRET}
      APP_PORT: 8080
    networks:
      - simkeu-network

  # Master Service
  master:
    build: ./services/master
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: simkeu
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: simkeu_master
      JWT_SECRET: ${JWT_SECRET}
      APP_PORT: 8080
    networks:
      - simkeu-network

  # Payment Service
  payment:
    build: ./services/payment
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: simkeu
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: simkeu_payment
      JWT_SECRET: ${JWT_SECRET}
      APP_PORT: 8080
    networks:
      - simkeu-network

  # Piutang Service
  piutang:
    build: ./services/piutang
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: simkeu
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: simkeu_piutang
      JWT_SECRET: ${JWT_SECRET}
      APP_PORT: 8080
    networks:
      - simkeu-network

  # Realisasi Service
  realisasi:
    build: ./services/realisasi
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: simkeu
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: simkeu_realisasi
      JWT_SECRET: ${JWT_SECRET}
      APP_PORT: 8080
    networks:
      - simkeu-network

  # Tagihan Service
  tagihan:
    build: ./services/tagihan
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: simkeu
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: simkeu_tagihan
      JWT_SECRET: ${JWT_SECRET}
      APP_PORT: 8080
    networks:
      - simkeu-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - auth
      - blockchain
      - debitur
      - log
      - master
      - payment
      - piutang
      - realisasi
      - tagihan
    networks:
      - simkeu-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  simkeu-network:
    driver: bridge
